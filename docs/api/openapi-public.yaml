        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        user_count:
          type: integer
          readOnly: true
        permission_count:
          type: integer
          readOnly: true
      required:
      - id
      - name
      - permission_count
      - user_count
