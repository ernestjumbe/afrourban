          type: string
      required:
      - access
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
    TypeEnum:
      enum:
      - physical
      - web
      type: string
      description: |-
        * `physical` - Physical
        * `web` - Web
