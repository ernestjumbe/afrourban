openapi: 3.0.3
info:
  title: Afrourban Public API
  version: v1
  description: Versioned API schema for Afrourban
paths:
  /api/v1/auth/email-verification/resend/:
    post:
      operationId: auth_email_verification_resend_create
      description: |-
        API view for resending a verification email.

        POST /api/v1/auth/email-verification/resend/
        Always returns 200 OK to prevent user enumeration.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationEmailInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendVerificationEmailInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendVerificationEmailInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendVerificationEmailInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/email-verification/verify/:
    post:
      operationId: auth_email_verification_verify_create
      description: |-
        API view for email verification.

        POST /api/v1/auth/email-verification/verify/
        Validates a verification token and marks the user's email as verified.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/passkey/authenticate/complete/:
    post:
      operationId: auth_passkey_authenticate_complete_create
      description: |-
        API view for passkey authentication completion.

        POST /api/v1/auth/passkey/authenticate/complete/
        Verifies assertion and returns JWT tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/passkey/authenticate/options/:
    post:
      operationId: auth_passkey_authenticate_options_create
      description: |-
        API view for passkey authentication options.

        POST /api/v1/auth/passkey/authenticate/options/
        Initiates the passkey authentication ceremony (discoverable credentials).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
          description: ''
      x-access-scope: public
  /api/v1/auth/passkey/register/complete/:
    post:
      operationId: auth_passkey_register_complete_create
      description: |-
        API view for passkey registration completion.

        POST /api/v1/auth/passkey/register/complete/
        Completes registration, creates user, triggers email verification.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/passkey/register/options/:
    post:
      operationId: auth_passkey_register_options_create
      description: |-
        API view for passkey registration options.

        POST /api/v1/auth/passkey/register/options/
        Initiates the passkey registration ceremony.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      description: |-
        Request password reset.

        Always returns success to prevent email enumeration.
        In production, would queue an email with reset link.

        Args:
            request: DRF request with email.

        Returns:
            Response with generic success message.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequest'
          description: ''
      x-access-scope: public
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: |-
        Complete password reset.

        Args:
            request: DRF request with token and new password.

        Returns:
            Response with success message or error.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
      x-access-scope: public
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        Handle user registration.

        Args:
            request: DRF request with registration data.

        Returns:
            Response with created user data or validation errors.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Custom JWT token obtain view.

        POST /api/v1/auth/token/
        Returns access and refresh tokens along with user data and policies.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
      x-access-scope: public
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        JWT token refresh view.

        POST /api/v1/auth/token/refresh/
        Returns new access token (and rotated refresh token).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
      x-access-scope: public
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        JWT token verification view.

        POST /api/v1/auth/token/verify/
        Verifies that a token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
      x-access-scope: public
  /api/v1/health/:
    get:
      operationId: health_retrieve
      description: Anonymous health endpoint for monitoring systems and frontend startup
        checks. Reports only application-process availability and excludes external
        dependency verification.
      summary: Application health check
      tags:
      - health
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
          description: ''
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
          description: ''
      x-access-scope: public
components:
  schemas:
    AdminProfile:
      type: object
      description: Serializer for profile data in admin user detail.
      properties:
        display_name:
          type: string
          readOnly: true
        bio:
          type: string
          readOnly: true
        avatar:
          type: string
          nullable: true
          description: Get avatar URL.
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        age_verification_status:
          type: string
          readOnly: true
        age_verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - age_verification_status
      - age_verified_at
      - avatar
      - bio
      - display_name
      - phone_number
    AdminUserDetail:
      type: object
      description: |-
        Serializer for user detail in admin view.

        Returns full user data including profile, roles, and permissions.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
        is_superuser:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        profile:
          allOf:
          - $ref: '#/components/schemas/AdminProfile'
          readOnly: true
        roles:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get roles with IDs and names.
          readOnly: true
        permissions:
          type: array
          items:
            type: string
          description: Get all permission codenames.
          readOnly: true
        policies:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get policies (placeholder for Phase 7).
          readOnly: true
      required:
      - date_joined
      - email
      - id
      - is_active
      - is_staff
      - is_superuser
      - last_login
      - permissions
      - policies
      - profile
      - roles
    AdminUserList:
      type: object
      description: |-
        Serializer for user list in admin view.

        Returns minimal user data for list display.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        display_name:
          type: string
          description: Get display name from profile.
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        roles:
          type: array
          items:
            type: string
          description: Get role names from user's groups.
          readOnly: true
      required:
      - date_joined
      - display_name
      - email
      - id
      - is_active
      - is_staff
      - last_login
      - roles
    AvatarUpload:
      type: object
      description: |-
        Input serializer for avatar upload.

        Validates file type (JPEG, PNG, WebP) and size (max 5MB).
      properties:
        avatar:
          type: string
          format: uri
          description: Profile picture (JPEG, PNG, or WebP, max 5MB)
      required:
      - avatar
    CategoryEnum:
      enum:
      - music
      - food_drink
      - arts_culture
      - community
      - sports_fitness
      - business_networking
      - education_workshop
      - other
      type: string
      description: |-
        * `music` - Music
        * `food_drink` - Food & Drink
        * `arts_culture` - Arts & Culture
        * `community` - Community
        * `sports_fitness` - Sports & Fitness
        * `business_networking` - Business & Networking
        * `education_workshop` - Education & Workshop
        * `other` - Other
    CustomTokenObtainPair:
      type: object
      description: |-
        Custom JWT token serializer with user data and policies.

        Extends the default TokenObtainPairSerializer to:
        1. Use email instead of username
        2. Include user data in response
        3. Embed policies as private claims in the token
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    EventCoverOutput:
      type: object
      description: Output serializer for successful event cover mutations.
      properties:
        asset_url:
          type: string
          format: uri
          readOnly: true
        message:
          type: string
          readOnly: true
      required:
      - asset_url
      - message
    EventCoverUpload:
      type: object
      description: Input serializer for event cover-image uploads.
      properties:
        cover_image:
          type: string
          format: uri
          description: Event cover image (JPEG, PNG, or WebP, max 5MB).
      required:
      - cover_image
    EventCreateInput:
      type: object
      description: Input serializer for personal and organization-owned event creates.
      properties:
        title:
          type: string
          description: Public event title.
          maxLength: 255
        description:
          type: string
          description: Public event description.
          maxLength: 1000
        category:
          allOf:
          - $ref: '#/components/schemas/CategoryEnum'
          default: other
          description: |-
            Primary event category. Defaults to other.

            * `music` - Music
            * `food_drink` - Food & Drink
            * `arts_culture` - Arts & Culture
            * `community` - Community
            * `sports_fitness` - Sports & Fitness
            * `business_networking` - Business & Networking
            * `education_workshop` - Education & Workshop
            * `other` - Other
        organization_id:
          type: integer
          minimum: 1
          nullable: true
          description: Optional organization to create the event under.
        start_at:
          type: string
          format: date-time
          description: Scheduled event start date and time.
        end_at:
          type: string
          format: date-time
          description: Scheduled event end date and time.
        location:
          allOf:
          - $ref: '#/components/schemas/EventLocationInput'
          description: Structured event location payload.
        tickets_url:
          type: string
          format: uri
          nullable: true
          description: Optional tickets or registration link.
      required:
      - description
      - end_at
      - location
      - start_at
      - title
    EventDetail:
      type: object
      description: Output serializer for event detail and create responses.
      properties:
        id:
          type: integer
          readOnly: true
        organizer_type:
          type: string
          readOnly: true
        owner_user_id:
          type: integer
          readOnly: true
          nullable: true
        organization_id:
          type: integer
          readOnly: true
          nullable: true
        title:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        category:
          type: string
          readOnly: true
        start_at:
          type: string
          format: date-time
          readOnly: true
        end_at:
          type: string
          format: date-time
          readOnly: true
        location:
          type: object
          additionalProperties:
            type: string
            nullable: true
          description: Return the current event location in contract shape.
          readOnly: true
        cover_image_url:
          type: string
          nullable: true
          description: Return the absolute cover-image URL when available.
          readOnly: true
        tickets_url:
          type: string
          format: uri
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - cover_image_url
      - created_at
      - description
      - end_at
      - id
      - location
      - organization_id
      - organizer_type
      - owner_user_id
      - start_at
      - tickets_url
      - title
      - updated_at
    EventLocationInput:
      type: object
      description: Nested input serializer for event location payloads.
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          description: |-
            Whether the event uses a physical or web location.

            * `physical` - Physical
            * `web` - Web
        web_url:
          type: string
          format: uri
          nullable: true
          description: Web address for online events.
        country:
          type: string
          nullable: true
          description: Country for physical event locations.
        state:
          type: string
          nullable: true
          description: State or region for physical event locations.
        city:
          type: string
          nullable: true
          description: City or town for physical event locations.
        postcode:
          type: string
          nullable: true
          description: Postcode or zipcode for physical event locations.
      required:
      - type
    HealthStatus:
      type: object
      description: Serializer for the health endpoint response contract.
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
      required:
      - status
    Logout:
      type: object
      description: Serializer for logout endpoint.
      properties:
        refresh:
          type: string
          description: The refresh token to blacklist
      required:
      - refresh
    OrganizationBrandingOutput:
      type: object
      description: Output serializer for branding upload responses.
      properties:
        asset_url:
          type: string
          format: uri
          readOnly: true
        message:
          type: string
          readOnly: true
      required:
      - asset_url
      - message
    OrganizationCoverUpload:
      type: object
      description: Input serializer for cover-image uploads.
      properties:
        cover_image:
          type: string
          format: uri
          description: Organization cover image (JPEG, PNG, or WebP, max 5MB).
      required:
      - cover_image
    OrganizationCreateInput:
      type: object
      description: Input serializer for organization create requests.
      properties:
        name:
          type: string
          description: Public organization name.
          maxLength: 255
        description:
          type: string
          description: Public organization description or bio.
        organization_type:
          allOf:
          - $ref: '#/components/schemas/OrganizationTypeEnum'
          description: |-
            Primary organization category.

            * `restaurant` - Restaurant
            * `barber` - Barber
            * `hair_salon` - Hair Salon
            * `bar` - Bar
            * `night_club` - Night Club
            * `event_organizer` - Event Organizer
            * `dance_crew` - Dance Crew
            * `online_community` - Online Community
            * `retail_store` - Retail Store
            * `other` - Other
        is_online_only:
          type: boolean
          description: Whether the organization operates exclusively online.
        physical_address:
          type: string
          nullable: true
          description: Physical address when the organization is not online-only.
      required:
      - description
      - is_online_only
      - name
      - organization_type
    OrganizationDetail:
      type: object
      description: Output serializer for organization detail and mutation responses.
      properties:
        id:
          type: integer
          readOnly: true
        owner_id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        organization_type:
          type: string
          readOnly: true
        is_online_only:
          type: boolean
          readOnly: true
        physical_address:
          type: string
          readOnly: true
          nullable: true
        logo_url:
          type: string
          nullable: true
          description: Return the absolute logo URL when available.
          readOnly: true
        cover_image_url:
          type: string
          nullable: true
          description: Return the absolute cover-image URL when available.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cover_image_url
      - created_at
      - description
      - id
      - is_online_only
      - logo_url
      - name
      - organization_type
      - owner_id
      - physical_address
      - updated_at
    OrganizationListResponse:
      type: object
      description: Pagination envelope serializer for organization collection responses.
      properties:
        count:
          type: integer
          readOnly: true
        next:
          type: string
          readOnly: true
          nullable: true
        previous:
          type: string
          readOnly: true
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationSummary'
          readOnly: true
      required:
      - count
      - next
      - previous
      - results
    OrganizationLogoUpload:
      type: object
      description: Input serializer for logo uploads.
      properties:
        logo:
          type: string
          format: uri
          description: Organization logo (JPEG, PNG, or WebP, max 5MB).
      required:
      - logo
    OrganizationSummary:
      type: object
      description: Output serializer for organization collection and detail payloads.
      properties:
        id:
          type: integer
          readOnly: true
        owner_id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        organization_type:
          type: string
          readOnly: true
        is_online_only:
          type: boolean
          readOnly: true
        physical_address:
          type: string
          readOnly: true
          nullable: true
        logo_url:
          type: string
          nullable: true
          description: Return the absolute logo URL when available.
          readOnly: true
        cover_image_url:
          type: string
          nullable: true
          description: Return the absolute cover-image URL when available.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cover_image_url
      - created_at
      - description
      - id
      - is_online_only
      - logo_url
      - name
      - organization_type
      - owner_id
      - physical_address
      - updated_at
    OrganizationTypeEnum:
      enum:
      - restaurant
      - barber
      - hair_salon
      - bar
      - night_club
      - event_organizer
      - dance_crew
      - online_community
      - retail_store
      - other
      type: string
      description: |-
        * `restaurant` - Restaurant
        * `barber` - Barber
        * `hair_salon` - Hair Salon
        * `bar` - Bar
        * `night_club` - Night Club
        * `event_organizer` - Event Organizer
        * `dance_crew` - Dance Crew
        * `online_community` - Online Community
        * `retail_store` - Retail Store
        * `other` - Other
    PasskeyAddCompleteInput:
      type: object
      description: Input serializer for completing passkey addition.
      properties:
        challenge_id:
          type: string
          format: uuid
          description: Challenge ID from options response
        credential:
          description: WebAuthn attestation response from navigator.credentials.create()
      required:
      - challenge_id
      - credential
    PasskeyAddOptionsInput:
      type: object
      description: Input serializer for adding a passkey to an existing account.
      properties:
        device_label:
          type: string
          default: ''
          description: Optional label for the new passkey (max 100 chars)
          maxLength: 100
    PasskeyAuthenticateCompleteInput:
      type: object
      description: Input serializer for passkey authentication completion.
      properties:
        challenge_id:
          type: string
          format: uuid
          description: Challenge ID from options response
        credential:
          description: WebAuthn assertion response from navigator.credentials.get()
      required:
      - challenge_id
      - credential
    PasskeyAuthenticateOptionsOutput:
      type: object
      description: Output serializer for passkey authentication options.
      properties:
        challenge_id:
          type: string
        options: {}
      required:
      - challenge_id
      - options
    PasskeyCredentialListOutput:
      type: object
      description: Output serializer for listing passkey credentials.
      properties:
        id:
          type: integer
          readOnly: true
        device_label:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_enabled:
          type: boolean
          readOnly: true
      required:
      - created_at
      - device_label
      - id
      - is_enabled
    PasskeyRegisterCompleteInput:
      type: object
      description: Input serializer for passkey registration completion.
      properties:
        challenge_id:
          type: string
          format: uuid
          description: Challenge ID from options response
        credential:
          description: WebAuthn attestation response from navigator.credentials.create()
      required:
      - challenge_id
      - credential
    PasskeyRegisterOptionsInput:
      type: object
      description: Input serializer for passkey registration options.
      properties:
        email:
          type: string
          format: email
          description: Email address for the new account
        display_name:
          type: string
          default: ''
          description: Optional display name (max 100 chars)
          maxLength: 100
      required:
      - email
    PasswordChange:
      type: object
      description: |-
        Input serializer for authenticated password change.

        Validates old password, new password, and confirmation.
      properties:
        old_password:
          type: string
          writeOnly: true
          description: Current password
        new_password:
          type: string
          writeOnly: true
          description: New password (min 8 characters)
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          description: New password confirmation (must match new_password)
      required:
      - new_password
      - new_password_confirm
      - old_password
    PasswordResetConfirm:
      type: object
      description: |-
        Input serializer for password reset confirmation.

        Validates token, new password, and password confirmation.
      properties:
        token:
          type: string
          description: Password reset token from email
        password:
          type: string
          writeOnly: true
          description: New password (min 8 characters)
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          description: New password confirmation (must match password)
      required:
      - password
      - password_confirm
      - token
    PasswordResetRequest:
      type: object
      description: |-
        Input serializer for password reset request.

        Validates email format. Does not check if email exists
        to prevent email enumeration attacks.
      properties:
        email:
          type: string
          format: email
          description: Email address for the account to reset password
      required:
      - email
    PatchedAdminUserDetail:
      type: object
      description: |-
        Serializer for user detail in admin view.

        Returns full user data including profile, roles, and permissions.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
        is_superuser:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        profile:
          allOf:
          - $ref: '#/components/schemas/AdminProfile'
          readOnly: true
        roles:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get roles with IDs and names.
          readOnly: true
        permissions:
          type: array
          items:
            type: string
          description: Get all permission codenames.
          readOnly: true
        policies:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get policies (placeholder for Phase 7).
          readOnly: true
    PatchedEventUpdateInput:
      type: object
      description: Input serializer for event patch requests.
      properties:
        title:
          type: string
          description: Updated public event title.
          maxLength: 255
        description:
          type: string
          description: Updated public event description.
          maxLength: 1000
        category:
          allOf:
          - $ref: '#/components/schemas/CategoryEnum'
          description: |-
            Updated primary event category.

            * `music` - Music
            * `food_drink` - Food & Drink
            * `arts_culture` - Arts & Culture
            * `community` - Community
            * `sports_fitness` - Sports & Fitness
            * `business_networking` - Business & Networking
            * `education_workshop` - Education & Workshop
            * `other` - Other
        start_at:
          type: string
          format: date-time
          description: Updated event start date and time.
        end_at:
          type: string
          format: date-time
          description: Updated event end date and time.
        location:
          allOf:
          - $ref: '#/components/schemas/EventLocationInput'
          description: Updated structured event location payload.
        tickets_url:
          type: string
          format: uri
          nullable: true
          description: Updated tickets or registration link.
    PatchedOrganizationUpdateInput:
      type: object
      description: Input serializer for organization patch requests.
      properties:
        name:
          type: string
          description: Updated public organization name.
          maxLength: 255
        description:
          type: string
          description: Updated public organization description or bio.
        organization_type:
          allOf:
          - $ref: '#/components/schemas/OrganizationTypeEnum'
          description: |-
            Updated primary organization category.

            * `restaurant` - Restaurant
            * `barber` - Barber
            * `hair_salon` - Hair Salon
            * `bar` - Bar
            * `night_club` - Night Club
            * `event_organizer` - Event Organizer
            * `dance_crew` - Dance Crew
            * `online_community` - Online Community
            * `retail_store` - Retail Store
            * `other` - Other
        is_online_only:
          type: boolean
          description: Whether the organization operates exclusively online.
        physical_address:
          type: string
          nullable: true
          description: Updated physical address when the organization is not online-only.
    PatchedProfileOutput:
      type: object
      description: |-
        Full profile output serializer for owner view.

