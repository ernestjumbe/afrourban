openapi: 3.0.3
info:
  title: Afrourban Internal API
  version: v1
  description: Versioned API schema for Afrourban
paths:
  /api/v1/admin/users/:
    get:
      operationId: admin_users_retrieve
      description: |-
        List users with optional filters.

        Query Parameters:
            - page: Page number (default: 1)
            - page_size: Items per page (default: 20, max: 100)
            - is_active: Filter by active status
            - is_staff: Filter by staff status
            - search: Search in email or display name
            - ordering: Sort field (default: -date_joined)

        Returns:
            Paginated list of users.
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserList'
          description: ''
      x-access-scope: staff
  /api/v1/admin/users/{user_id}/:
    get:
      operationId: admin_users_retrieve_2
      description: |-
        Get detailed user information.

        Args:
            request: The HTTP request.
            user_id: The user's ID.

        Returns:
            User detail data.
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
          description: ''
      x-access-scope: staff
    patch:
      operationId: admin_users_partial_update
      description: |-
        Update user account settings.

        Args:
            request: The HTTP request with update data.
            user_id: The user's ID.

        Returns:
            Updated user data.
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserDetail'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
          description: ''
      x-access-scope: staff
  /api/v1/admin/users/{user_id}/activate/:
    post:
      operationId: admin_users_activate_create
      description: |-
        Activate a user account.

        Args:
            request: The HTTP request.
            user_id: The user's ID.

        Returns:
            Activation confirmation.
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserActivationOutput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserActivationOutput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserActivationOutput'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserActivationOutput'
          description: ''
      x-access-scope: staff
  /api/v1/admin/users/{user_id}/deactivate/:
    post:
      operationId: admin_users_deactivate_create
      description: |-
        Deactivate a user account.

        Args:
            request: The HTTP request.
            user_id: The user's ID.

        Returns:
            Deactivation confirmation.
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserActivationOutput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserActivationOutput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserActivationOutput'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserActivationOutput'
          description: ''
      x-access-scope: staff
  /api/v1/admin/users/{user_id}/permissions/:
    get:
      operationId: admin_users_permissions_retrieve
      description: |-
        Get user's effective permissions.

        Args:
            request: The HTTP request.
            user_id: The user's ID.

        Returns:
            User permissions data.
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsOutput'
          description: ''
      x-access-scope: staff
    put:
      operationId: admin_users_permissions_update
      description: |-
        Set user's direct permissions.

        Args:
            request: The HTTP request with permission IDs.
            user_id: The user's ID.

        Returns:
            Updated permissions data.
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionsOutput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PermissionsOutput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PermissionsOutput'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsOutput'
          description: ''
      x-access-scope: staff
  /api/v1/admin/users/roles/:
    get:
      operationId: admin_users_roles_retrieve
      description: |-
        List all available roles.

        Returns:
            List of roles with user and permission counts.
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleList'
          description: ''
      x-access-scope: staff
    post:
      operationId: admin_users_roles_create
      description: |-
        Create a new role.

        Args:
            request: The HTTP request with role data.

        Returns:
            Created role data.
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleList'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RoleList'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RoleList'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleList'
          description: ''
      x-access-scope: staff
  /api/v1/admin/users/roles/{role_id}/:
    get:
      operationId: admin_users_roles_retrieve_2
      description: |-
        Get role details.

        Args:
            request: The HTTP request.
            role_id: The role's ID.

        Returns:
            Role detail data with permissions and policies.
      parameters:
      - in: path
        name: role_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleDetail'
          description: ''
      x-access-scope: staff
    patch:
      operationId: admin_users_roles_partial_update
      description: |-
        Update a role.

        Args:
            request: The HTTP request with update data.
            role_id: The role's ID.

        Returns:
            Updated role data.
      parameters:
      - in: path
        name: role_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedRoleDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedRoleDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedRoleDetail'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleDetail'
          description: ''
      x-access-scope: staff
    delete:
      operationId: admin_users_roles_destroy
      description: |-
        Delete a role.

        Args:
            request: The HTTP request.
            role_id: The role's ID.

        Returns:
            Empty response with 204 status.
      parameters:
      - in: path
        name: role_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
      x-access-scope: staff
  /api/v1/auth/email-verification/resend/:
    post:
      operationId: auth_email_verification_resend_create
      description: |-
        API view for resending a verification email.

        POST /api/v1/auth/email-verification/resend/
        Always returns 200 OK to prevent user enumeration.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationEmailInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendVerificationEmailInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendVerificationEmailInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendVerificationEmailInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/email-verification/verify/:
    post:
      operationId: auth_email_verification_verify_create
      description: |-
        API view for email verification.

        POST /api/v1/auth/email-verification/verify/
        Validates a verification token and marks the user's email as verified.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        Handle user logout by blacklisting refresh token.

        Args:
            request: DRF request with refresh token.

        Returns:
            Empty response with 205 Reset Content status.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Logout'
          description: ''
      x-access-scope: authenticated
  /api/v1/auth/passkey/:
    get:
      operationId: auth_passkey_retrieve
      description: |-
        API view for listing a user's passkey credentials.

        GET /api/v1/auth/passkey/
        Returns the authenticated user's registered passkeys.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyCredentialListOutput'
          description: ''
      x-access-scope: authenticated
  /api/v1/auth/passkey/{credential_id}/:
    delete:
      operationId: auth_passkey_destroy
      description: |-
        API view for removing a passkey credential.

        DELETE /api/v1/auth/passkey/<credential_id>/
        Removes a passkey credential from the authenticated user's account.
      parameters:
      - in: path
        name: credential_id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
      x-access-scope: authenticated
  /api/v1/auth/passkey/add/complete/:
    post:
      operationId: auth_passkey_add_complete_create
      description: |-
        API view for completing passkey addition.

        POST /api/v1/auth/passkey/add/complete/
        Completes passkey addition for an authenticated user.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAddCompleteInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyAddCompleteInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyAddCompleteInput'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAddCompleteInput'
          description: ''
      x-access-scope: authenticated
  /api/v1/auth/passkey/add/options/:
    post:
      operationId: auth_passkey_add_options_create
      description: |-
        API view for adding a passkey to an existing account.

        POST /api/v1/auth/passkey/add/options/
        Initiates passkey addition for an authenticated user.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAddOptionsInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyAddOptionsInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyAddOptionsInput'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAddOptionsInput'
          description: ''
      x-access-scope: authenticated
  /api/v1/auth/passkey/authenticate/complete/:
    post:
      operationId: auth_passkey_authenticate_complete_create
      description: |-
        API view for passkey authentication completion.

        POST /api/v1/auth/passkey/authenticate/complete/
        Verifies assertion and returns JWT tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticateCompleteInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/passkey/authenticate/options/:
    post:
      operationId: auth_passkey_authenticate_options_create
      description: |-
        API view for passkey authentication options.

        POST /api/v1/auth/passkey/authenticate/options/
        Initiates the passkey authentication ceremony (discoverable credentials).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticateOptionsOutput'
          description: ''
      x-access-scope: public
  /api/v1/auth/passkey/register/complete/:
    post:
      operationId: auth_passkey_register_complete_create
      description: |-
        API view for passkey registration completion.

        POST /api/v1/auth/passkey/register/complete/
        Completes registration, creates user, triggers email verification.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegisterCompleteInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/passkey/register/options/:
    post:
      operationId: auth_passkey_register_options_create
      description: |-
        API view for passkey registration options.

        POST /api/v1/auth/passkey/register/options/
        Initiates the passkey registration ceremony.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegisterOptionsInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: |-
        Change password for the authenticated user.

        Args:
            request: DRF request with old and new passwords.

        Returns:
            Response with success message or error.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChange'
          description: ''
      x-access-scope: authenticated
  /api/v1/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      description: |-
        Request password reset.

        Always returns success to prevent email enumeration.
        In production, would queue an email with reset link.

        Args:
            request: DRF request with email.

        Returns:
            Response with generic success message.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequest'
          description: ''
      x-access-scope: public
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: |-
        Complete password reset.

        Args:
            request: DRF request with token and new password.

        Returns:
            Response with success message or error.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
      x-access-scope: public
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        Handle user registration.

        Args:
            request: DRF request with registration data.

        Returns:
            Response with created user data or validation errors.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInput'
          description: ''
      x-access-scope: public
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Custom JWT token obtain view.

        POST /api/v1/auth/token/
        Returns access and refresh tokens along with user data and policies.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
      x-access-scope: public
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        JWT token refresh view.

        POST /api/v1/auth/token/refresh/
        Returns new access token (and rotated refresh token).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
      x-access-scope: public
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        JWT token verification view.

        POST /api/v1/auth/token/verify/
        Verifies that a token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
      x-access-scope: public
  /api/v1/auth/username/:
    patch:
      operationId: auth_username_partial_update
      description: Change the authenticated user's username.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUsernameChangeInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUsernameChangeInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUsernameChangeInput'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsernameChangeOutput'
          description: ''
      x-access-scope: authenticated
  /api/v1/profiles/{user_id}/:
    get:
      operationId: profiles_retrieve
      description: |-
        Get a user's public profile.

        Args:
            request: HTTP request.
            user_id: The user ID to look up.

        Returns:
            Public profile data (limited fields).
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePublicOutput'
          description: ''
      x-access-scope: authenticated
  /api/v1/profiles/me/:
    get:
      operationId: profiles_me_retrieve
      description: |-
        Get the authenticated user's profile.

        Args:
            request: HTTP request.

        Returns:
            Profile data with all fields.
      tags:
      - profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileOutput'
          description: ''
      x-access-scope: authenticated
    patch:
      operationId: profiles_me_partial_update
      description: |-
        Update the authenticated user's profile.

        Args:
            request: HTTP request with update data.

        Returns:
            Updated profile data.
      tags:
      - profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfileOutput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileOutput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileOutput'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileOutput'
          description: ''
      x-access-scope: authenticated
  /api/v1/profiles/me/avatar/:
    post:
      operationId: profiles_me_avatar_create
      description: |-
        Upload a new avatar image.

        Args:
            request: HTTP request with avatar file.

        Returns:
            Avatar URL and success message.
      tags:
      - profiles
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUpload'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUpload'
          description: ''
      x-access-scope: authenticated
    delete:
      operationId: profiles_me_avatar_destroy
      description: |-
        Delete the current avatar.

        Args:
            request: HTTP request.

        Returns:
            Empty response with 204 status.
      tags:
      - profiles
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
      x-access-scope: authenticated
  /api/v1/profiles/policies/{policy_id}/check/:
    get:
      operationId: profiles_policies_check_retrieve
      description: |-
        Check if the authenticated user passes the given policy.

        Args:
            request: HTTP request.
            policy_id: The policy ID to evaluate.

        Returns:
            Policy check result with pass/fail and reason.
      parameters:
      - in: path
        name: policy_id
        schema:
          type: integer
        required: true
      tags:
      - profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyCheckOutput'
          description: ''
      x-access-scope: authenticated
components:
  schemas:
    AdminProfile:
      type: object
      description: Serializer for profile data in admin user detail.
      properties:
        display_name:
          type: string
          readOnly: true
        bio:
          type: string
          readOnly: true
        avatar:
          type: string
          nullable: true
          description: Get avatar URL.
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        age_verification_status:
          type: string
          readOnly: true
        age_verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - age_verification_status
      - age_verified_at
      - avatar
      - bio
      - display_name
      - phone_number
    AdminUserDetail:
      type: object
      description: |-
        Serializer for user detail in admin view.

        Returns full user data including profile, roles, and permissions.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
        is_superuser:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        profile:
          allOf:
          - $ref: '#/components/schemas/AdminProfile'
          readOnly: true
        roles:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get roles with IDs and names.
          readOnly: true
        permissions:
          type: array
          items:
            type: string
          description: Get all permission codenames.
          readOnly: true
        policies:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get policies (placeholder for Phase 7).
          readOnly: true
      required:
      - date_joined
      - email
      - id
      - is_active
      - is_staff
      - is_superuser
      - last_login
      - permissions
      - policies
      - profile
      - roles
    AdminUserList:
      type: object
      description: |-
        Serializer for user list in admin view.

        Returns minimal user data for list display.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        display_name:
          type: string
          description: Get display name from profile.
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        roles:
          type: array
          items:
            type: string
          description: Get role names from user's groups.
          readOnly: true
      required:
      - date_joined
      - display_name
      - email
      - id
      - is_active
      - is_staff
      - last_login
      - roles
    AvatarUpload:
      type: object
      description: |-
        Input serializer for avatar upload.

        Validates file type (JPEG, PNG, WebP) and size (max 5MB).
      properties:
        avatar:
          type: string
          format: uri
          description: Profile picture (JPEG, PNG, or WebP, max 5MB)
      required:
      - avatar
    CustomTokenObtainPair:
      type: object
      description: |-
        Custom JWT token serializer with user data and policies.

        Extends the default TokenObtainPairSerializer to:
        1. Use email instead of username
        2. Include user data in response
        3. Embed policies as private claims in the token
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Logout:
      type: object
      description: Serializer for logout endpoint.
      properties:
        refresh:
          type: string
          description: The refresh token to blacklist
      required:
      - refresh
    PasskeyAddCompleteInput:
      type: object
      description: Input serializer for completing passkey addition.
      properties:
        challenge_id:
          type: string
          format: uuid
          description: Challenge ID from options response
        credential:
          description: WebAuthn attestation response from navigator.credentials.create()
      required:
      - challenge_id
      - credential
    PasskeyAddOptionsInput:
      type: object
      description: Input serializer for adding a passkey to an existing account.
      properties:
        device_label:
          type: string
          default: ''
          description: Optional label for the new passkey (max 100 chars)
          maxLength: 100
    PasskeyAuthenticateCompleteInput:
      type: object
      description: Input serializer for passkey authentication completion.
      properties:
        challenge_id:
          type: string
          format: uuid
          description: Challenge ID from options response
        credential:
          description: WebAuthn assertion response from navigator.credentials.get()
      required:
      - challenge_id
      - credential
    PasskeyAuthenticateOptionsOutput:
      type: object
      description: Output serializer for passkey authentication options.
      properties:
        challenge_id:
          type: string
        options: {}
      required:
      - challenge_id
      - options
    PasskeyCredentialListOutput:
      type: object
      description: Output serializer for listing passkey credentials.
      properties:
        id:
          type: integer
          readOnly: true
        device_label:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_enabled:
          type: boolean
          readOnly: true
      required:
      - created_at
      - device_label
      - id
      - is_enabled
    PasskeyRegisterCompleteInput:
      type: object
      description: Input serializer for passkey registration completion.
      properties:
        challenge_id:
          type: string
          format: uuid
          description: Challenge ID from options response
        credential:
          description: WebAuthn attestation response from navigator.credentials.create()
      required:
      - challenge_id
      - credential
    PasskeyRegisterOptionsInput:
      type: object
      description: Input serializer for passkey registration options.
      properties:
        email:
          type: string
          format: email
          description: Email address for the new account
        display_name:
          type: string
          default: ''
          description: Optional display name (max 100 chars)
          maxLength: 100
      required:
      - email
    PasswordChange:
      type: object
      description: |-
        Input serializer for authenticated password change.

        Validates old password, new password, and confirmation.
      properties:
        old_password:
          type: string
          writeOnly: true
          description: Current password
        new_password:
          type: string
          writeOnly: true
          description: New password (min 8 characters)
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          description: New password confirmation (must match new_password)
      required:
      - new_password
      - new_password_confirm
      - old_password
    PasswordResetConfirm:
      type: object
      description: |-
        Input serializer for password reset confirmation.

        Validates token, new password, and password confirmation.
      properties:
        token:
          type: string
          description: Password reset token from email
        password:
          type: string
          writeOnly: true
          description: New password (min 8 characters)
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          description: New password confirmation (must match password)
      required:
      - password
      - password_confirm
      - token
    PasswordResetRequest:
      type: object
      description: |-
        Input serializer for password reset request.

        Validates email format. Does not check if email exists
        to prevent email enumeration attacks.
      properties:
        email:
          type: string
          format: email
          description: Email address for the account to reset password
      required:
      - email
    PatchedAdminUserDetail:
      type: object
      description: |-
        Serializer for user detail in admin view.

        Returns full user data including profile, roles, and permissions.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
        is_superuser:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        profile:
          allOf:
          - $ref: '#/components/schemas/AdminProfile'
          readOnly: true
        roles:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get roles with IDs and names.
          readOnly: true
        permissions:
          type: array
          items:
            type: string
          description: Get all permission codenames.
          readOnly: true
        policies:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get policies (placeholder for Phase 7).
          readOnly: true
    PatchedProfileOutput:
      type: object
      description: |-
        Full profile output serializer for owner view.

        Includes all profile fields plus user email.
        Used for GET /api/profiles/me/ and PATCH response.
      properties:
        user_id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        display_name:
          type: string
          readOnly: true
        bio:
          type: string
          readOnly: true
        avatar:
          type: string
          nullable: true
          description: |-
            Return full avatar URL or None.

            Args:
                obj: Profile instance.

            Returns:
                Absolute URL to avatar or None if no avatar.
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        date_of_birth:
          type: string
          format: date
          readOnly: true
          nullable: true
        age:
          type: integer
          readOnly: true
          nullable: true
        age_verification_status:
          type: string
          readOnly: true
        age_verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        preferences:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedRoleDetail:
      type: object
      description: |-
        Serializer for role detail endpoint.

        Returns full role data with permissions and policies.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
          readOnly: true
        policies:
          type: array
          items: {}
          readOnly: true
        user_count:
          type: integer
          readOnly: true
    PatchedUsernameChangeInput:
      type: object
      description: Input serializer for authenticated username changes.
      properties:
        username:
          type: string
          description: New account username. Must be 3-30 characters, contain at least
            one letter, not start with '.', and use only letters, numbers, '_' or
            '.'.
          maxLength: 30
    Permission:
      type: object
      description: Serializer for permission data.
      properties:
        id:
          type: integer
          readOnly: true
        codename:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
      required:
      - codename
      - id
      - name
    PermissionsOutput:
      type: object
      description: Output serializer for user permissions response.
      properties:
        user_id:
          type: integer
          readOnly: true
        direct_permissions:
          type: array
          items: {}
          readOnly: true
        role_permissions:
          type: array
          items: {}
          readOnly: true
        effective_permissions:
          type: array
          items:
            type: string
          readOnly: true
        message:
          type: string
          readOnly: true
      required:
      - direct_permissions
      - effective_permissions
      - message
      - role_permissions
      - user_id
    PolicyCheckOutput:
      type: object
      description: |-
        Output serializer for policy check response.

        Returns whether the authenticated user passes a specific policy,
        with reason and message on failure.
      properties:
        policy_id:
          type: integer
          readOnly: true
        policy_name:
          type: string
          readOnly: true
        passed:
          type: boolean
          readOnly: true
        reason:
          type: string
          readOnly: true
          nullable: true
        message:
          type: string
          readOnly: true
          nullable: true
        evaluated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - evaluated_at
      - message
      - passed
      - policy_id
      - policy_name
      - reason
    ProfileOutput:
      type: object
      description: |-
        Full profile output serializer for owner view.

        Includes all profile fields plus user email.
        Used for GET /api/profiles/me/ and PATCH response.
      properties:
        user_id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        display_name:
          type: string
          readOnly: true
        bio:
          type: string
          readOnly: true
        avatar:
          type: string
          nullable: true
          description: |-
            Return full avatar URL or None.

            Args:
                obj: Profile instance.

            Returns:
                Absolute URL to avatar or None if no avatar.
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        date_of_birth:
          type: string
          format: date
          readOnly: true
          nullable: true
        age:
          type: integer
          readOnly: true
          nullable: true
        age_verification_status:
          type: string
          readOnly: true
        age_verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        preferences:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - age
      - age_verification_status
      - age_verified_at
      - avatar
      - bio
      - created_at
      - date_of_birth
      - display_name
      - email
      - phone_number
      - preferences
      - updated_at
      - user_id
    ProfilePublicOutput:
      type: object
      description: |-
        Public profile output serializer.

        Limited fields for viewing user profiles.
        Used for GET /api/profiles/{user_id}/.

        Email is included only when the profile is owned by the requester.
        Date of birth is not included; only age and age_verified are exposed.
      properties:
        user_id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        display_name:
          type: string
          readOnly: true
        bio:
          type: string
          readOnly: true
        avatar:
          type: string
          nullable: true
          description: |-
            Return full avatar URL or None.

            Args:
                obj: Profile instance.

            Returns:
                Absolute URL to avatar or None if no avatar.
          readOnly: true
        age:
          type: integer
          readOnly: true
          nullable: true
        age_verified:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - age
      - age_verified
      - avatar
      - bio
      - created_at
      - display_name
      - email
      - user_id
    RegisterInput:
      type: object
      description: |-
        Input serializer for user registration.

        Validates registration data including email uniqueness,
        username requirements, and password confirmation matching.
      properties:
        email:
          type: string
          format: email
          description: User's email address (used as login identifier)
          maxLength: 255
        password:
          type: string
          writeOnly: true
          description: User's password (min 8 characters)
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          description: Password confirmation (must match password)
        username:
          type: string
          description: Required account username. Must be 3-30 characters, contain
            at least one letter, not start with '.', and use only letters, numbers,
            '_' or '.'.
          maxLength: 30
        display_name:
          type: string
          description: Optional public display name
          maxLength: 100
      required:
      - email
      - password
      - password_confirm
      - username
    ResendVerificationEmailInput:
      type: object
      description: Input serializer for resending a verification email.
      properties:
        email:
          type: string
          format: email
      required:
      - email
    RoleDetail:
      type: object
      description: |-
        Serializer for role detail endpoint.

        Returns full role data with permissions and policies.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
          readOnly: true
        policies:
          type: array
          items: {}
          readOnly: true
        user_count:
          type: integer
          readOnly: true
      required:
      - id
      - name
      - permissions
      - policies
      - user_count
    RoleList:
      type: object
      description: |-
        Serializer for role list endpoint.

        Returns role summary with user and permission counts.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        user_count:
          type: integer
          readOnly: true
        permission_count:
          type: integer
          readOnly: true
      required:
      - id
      - name
      - permission_count
      - user_count
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
    UserActivationOutput:
      type: object
      description: Output serializer for user activation/deactivation.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        message:
          type: string
          readOnly: true
      required:
      - email
      - id
      - is_active
      - message
    UsernameChangeOutput:
      type: object
      description: Output serializer for successful username changes.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        cooldown_days:
          type: integer
          readOnly: true
        next_allowed_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cooldown_days
      - id
      - next_allowed_at
      - username
    VerifyEmailInput:
      type: object
      description: Input serializer for email verification.
      properties:
        token:
          type: string
      required:
      - token
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
x-deprecations:
  minimum_notice_days: 90
  required_fields:
  - deprecation_date
  - removal_date
  - migration_path
  versions:
  - target_type: version
    target_id: v1
    base_path: /api/v1/
    status: active
    deprecation_date: null
    removal_date: null
    migration_path: null
  endpoints: []
