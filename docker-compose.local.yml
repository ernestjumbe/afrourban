services:
  frontend:
    env_file: env/.env.docker
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: ./Dockerfile.local
    command: sh -lc 'npm run dev -- --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3030}'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '${FRONTEND_PORT:-3030}:${FRONTEND_PORT:-3030}'
    environment:
      NODE_ENV: development
      FRONTEND_PORT: ${FRONTEND_PORT:-3030}
      SITE_URL: http://localhost:${FRONTEND_PORT:-3030}
      API_URL: ${API_URL:-http://django:8000/api/v1}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-false}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- "http://127.0.0.1:${FRONTEND_PORT:-3030}/" >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      django:
        condition: service_started

  django:
    env_file: env/.env.docker
    restart: unless-stopped
    build:
      context: .
      # target: runtime
      dockerfile: ./compose/local/django/Dockerfile
    command: /start
    ports:
      - '8000:8000'
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  celery_worker:
    env_file: env/.env.docker
    build:
      context: .
      target: runtime
      dockerfile: ./compose/local/django/Dockerfile
    command: celery -A afrourban.celery:app worker -l INFO
    volumes:
      - .:/app
    depends_on:
      - django

  celery_beat:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: afrourban_celery_beat
    command: /start-celerybeat
    volumes:
      - .:/app
    env_file:
      - env/.env.docker
    environment:
      - DJANGO_SETTINGS_MODULE=afrourban.settings.local
    depends_on:
      - django
      - celery_worker

  flower:
    restart: unless-stopped
    env_file: env/.env.docker
    environment:
      - DJANGO_SETTINGS_MODULE=afrourban.settings.local
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: afrourban_celery_flower
    command: /start-flower
    volumes:
      - .:/app
    ports:
      - 5557:5555
    depends_on:
      - celery_worker

volumes:
  frontend_node_modules: